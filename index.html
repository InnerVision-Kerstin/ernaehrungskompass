<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blutgruppen Ernährung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

  :root {
    --sage: #8FA67A;
    --apricot: #F4C27E;
    --rose: #D3B1C2;
    --dark: #2C1F1A;
    --mauve: #4A3040;
    --bg: #FAF8F5;
    --green: #5a9e6f;
    --green-bg: #edf7f0;
    --yellow: #d4900a;
    --yellow-bg: #fef8e7;
    --red: #c0392b;
    --red-bg: #fdf0ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    background: var(--sage);
    padding: 28px 20px 22px;
    text-align: center;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #fff;
    font-weight: 400;
  }

  header p {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .blood-selector {
    display: flex;
    gap: 0;
    background: #fff;
    border-bottom: 2px solid #ece7e2;
  }

  .blood-btn {
    flex: 1;
    padding: 14px 4px;
    border: none;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #bbb;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }

  .blood-btn span {
    display: block;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 2px;
    font-weight: 300;
  }

  .blood-btn.active {
    color: var(--sage);
    border-bottom-color: var(--sage);
  }

  .blood-btn:hover { color: var(--sage); }

  .search-wrap {
    padding: 16px 16px 8px;
  }

  .search-wrap input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #ddd;
    border-radius: 2px;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 15px;
    background: #fff;
    color: var(--dark);
    outline: none;
  }

  .search-wrap input:focus { border-color: var(--sage); }
  .search-wrap input::placeholder { color: #bbb; }

  .cat-tabs {
    padding: 0 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .cat-tab {
    padding: 5px 12px;
    border: 1px solid #ddd;
    border-radius: 20px;
    background: transparent;
    font-size: 12px;
    font-weight: 300;
    color: var(--mauve);
    cursor: pointer;
    transition: all 0.2s;
  }

  .cat-tab.active, .cat-tab:hover {
    background: var(--sage);
    border-color: var(--sage);
    color: #fff;
  }

  .filter-row {
    padding: 0 16px 12px;
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.4;
  }

  .filter-btn.active { opacity: 1; }

  .filter-btn.green { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green); }
  .filter-btn.yellow { background: var(--yellow-bg); color: var(--yellow); border: 1.5px solid var(--yellow); }
  .filter-btn.red { background: var(--red-bg); color: var(--red); border: 1.5px solid var(--red); }

  .list {
    padding: 0 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item {
    background: #fff;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-left: 3px solid transparent;
  }

  .item.g { border-left-color: var(--green); }
  .item.n { border-left-color: var(--yellow); }
  .item.v { border-left-color: var(--red); }

  .item-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .item-emoji { font-size: 20px; flex-shrink: 0; }

  .item-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--dark);
  }

  .item-cat {
    font-size: 11px;
    color: #aaa;
    margin-top: 1px;
  }

  .item-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 400;
    flex-shrink: 0;
  }

  .badge-g { background: var(--green-bg); color: var(--green); }
  .badge-n { background: var(--yellow-bg); color: var(--yellow); }
  .badge-v { background: var(--red-bg); color: var(--red); }

  .empty {
    text-align: center;
    padding: 48px 24px;
    color: #bbb;
    font-size: 15px;
  }

  .legend {
    display: flex;
    gap: 12px;
    padding: 8px 16px 14px;
    font-size: 11px;
    color: #999;
    flex-wrap: wrap;
  }

  .legend span { display: flex; align-items: center; gap: 4px; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .dot-g { background: var(--green); }
  .dot-n { background: var(--yellow); }
  .dot-r { background: var(--red); }

  .disclaimer {
    margin: 12px 16px;
    padding: 10px 12px;
    background: #fdf8f4;
    border-left: 3px solid var(--apricot);
    font-size: 11px;
    color: #aaa;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <h1>Blutgruppen Ernährung</h1>
  <p>Nach D'Adamo · Österreichische Lebensmittel</p>
</header>

<div class="blood-selector" id="bloodSel"></div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Lebensmittel suchen…" oninput="render()">
</div>

<div class="legend">
  <span><div class="dot dot-g"></div> Sehr bekömmlich</span>
  <span><div class="dot dot-n"></div> Neutral</span>
  <span><div class="dot dot-r"></div> Vermeiden</span>
</div>

<div class="cat-tabs" id="catTabs"></div>

<div class="filter-row">
  <button class="filter-btn green active" onclick="toggleFilter('g', this)">✓ Bekömmlich</button>
  <button class="filter-btn yellow active" onclick="toggleFilter('n', this)">~ Neutral</button>
  <button class="filter-btn red active" onclick="toggleFilter('v', this)">✗ Vermeiden</button>
</div>

<div class="list" id="list"></div>

<div class="disclaimer">
  Nach D'Adamo "4 Blutgruppen – Vier Strategien für ein gesundes Leben". Wissenschaftlich nicht belegt. Eigene Körperwahrnehmung geht vor.
</div>

const bloodTypes = ["0","A","B","AB"];
const bloodLabels = { "0":"0", "A":"A", "B":"B", "AB":"AB" };
const bloodSub = { "0":"Der Jäger", "A":"Der Landwirt", "B":"Der Nomade", "AB":"Der Rätselhafte" };

let activeBT = "0";
let activeCat = "Alle";
let activeFilters = { g: true, n: true, v: true };

function toggleFilter(type, btn) {
  activeFilters[type] = !activeFilters[type];
  btn.classList.toggle('active', activeFilters[type]);
  render();
}

function getKats() {
  return ["Alle", ...new Set(foods.map(f => f.kat))];
}

function badgeLabel(val) {
  if (val === "g") return "Bekömmlich";
  if (val === "n") return "Neutral";
  return "Vermeiden";
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();

  // Blood selector
  document.getElementById("bloodSel").innerHTML = bloodTypes.map(bt => `
    <button class="blood-btn ${activeBT === bt ? 'active' : ''}" onclick="setBT('${bt}')">
      ${bloodLabels[bt]}
      <span>${bloodSub[bt]}</span>
    </button>
  `).join("");

  // Cat tabs
  document.getElementById("catTabs").innerHTML = getKats().map(k => `
    <button class="cat-tab ${activeCat === k ? 'active' : ''}" onclick="setCat('${k}')">${k}</button>
  `).join("");

  // Filter
  let filtered = foods;
  if (activeCat !== "Alle") filtered = filtered.filter(f => f.kat === activeCat);
  filtered = filtered.filter(f => activeFilters[f[activeBT]]);
  if (q) filtered = filtered.filter(f => f.name.toLowerCase().includes(q) || f.kat.toLowerCase().includes(q));

  const listEl = document.getElementById("list");
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">Nichts gefunden.</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(f => {
    const val = f[activeBT];
    return `
      <div class="item ${val}">
        <div class="item-left">
          <span class="item-emoji">${f.emoji}</span>
          <div>
            <div class="item-name">${f.name}</div>
            <div class="item-cat">${f.kat}</div>
          </div>
        </div>
        <span class="item-badge badge-${val}">${badgeLabel(val)}</span>
      </div>
    `;
  }).join("");
}

function setBT(bt) { activeBT = bt; render(); }
function setCat(k) { activeCat = k; render(); }

render();
</script>
